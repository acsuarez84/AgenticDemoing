<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woven Words — Regenerative Textile Rhetoric</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Mono:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#06050a;color:#fff;font-family:'Courier New',monospace;overflow-x:hidden;}
#app{max-width:620px;margin:0 auto;padding:16px 10px 60px;}
.hdr{text-align:center;margin-bottom:12px;}
.hdr .sub{font-size:11px;letter-spacing:.3em;color:#555;text-transform:uppercase;margin-bottom:4px;}
.hdr h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:300;color:#c4956a;letter-spacing:.14em;text-transform:uppercase;}
.status{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;justify-content:center;}
.badge{padding:5px 14px;border-radius:3px;font-size:12px;letter-spacing:.15em;text-transform:uppercase;font-weight:700;}
.desc{font-size:20px;color:#fff;margin-bottom:10px;text-align:center;font-family:'Cormorant Garamond',Georgia,serif;}
.typing-box{width:100%;min-height:40px;padding:8px 12px;background:#0a0a10;border:1px solid #1a1a24;border-radius:4px;margin-bottom:10px;font-size:20px;color:#fff;letter-spacing:.02em;line-height:1.5;font-family:'Courier New',monospace;overflow:hidden;}
.cursor{display:inline-block;width:9px;height:20px;margin-left:3px;vertical-align:middle;animation:blink .7s step-end infinite;}
.prog-wrap{width:100%;height:3px;background:#111;border-radius:2px;margin-bottom:10px;overflow:hidden;}
.prog-fill{height:100%;transition:width .05s linear;}
#grid{display:grid;gap:0;background:#030308;border:1px solid #1a1a20;border-radius:4px;overflow:hidden;margin:0 auto;}
.cell{display:flex;align-items:center;justify-content:center;font-size:7px;line-height:1;font-family:'DM Mono',monospace;color:#fff;}
.poem-box{margin-top:16px;padding:16px 18px;border-radius:4px;}
.poem-label{font-size:11px;opacity:.5;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;font-family:'DM Mono',monospace;}
.poem-line{font-size:20px;color:#fff;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;line-height:1.7;opacity:0;transform:translateY(8px);transition:opacity .5s ease,transform .5s ease;}
.poem-line.show{opacity:1;transform:translateY(0);}
#archive{margin-top:24px;max-height:500px;overflow-y:auto;}
.archive-label{font-size:11px;color:#444;letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;text-align:center;font-family:'DM Mono',monospace;}
.archive-entry{margin-bottom:20px;padding:14px 16px;background:#0a0a0f;border-radius:4px;}
.archive-entry .meta{font-size:10px;opacity:.5;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;font-family:'DM Mono',monospace;}
.archive-entry .line{font-size:20px;color:#fff;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;line-height:1.7;}
.footer{margin-top:28px;font-size:20px;color:#fff;text-align:center;line-height:1.8;font-family:'Cormorant Garamond',Georgia,serif;}
.footer .sm{font-size:14px;color:#666;}
@keyframes blink{50%{opacity:0}}
#archive::-webkit-scrollbar{width:4px}
#archive::-webkit-scrollbar-track{background:#0a0a0f}
#archive::-webkit-scrollbar-thumb{background:#222;border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="sub">Generative Textile Rhetoric</div>
    <h1>Woven Words</h1>
  </div>
  <div class="status" id="status"></div>
  <div class="desc" id="desc"></div>
  <div class="typing-box" id="typing"></div>
  <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
  <div style="display:flex;justify-content:center"><div id="grid"></div></div>
  <div id="poem-area"></div>
  <div id="archive"></div>
  <div class="footer">
    Cotton Weaving (1909) · History of Silk, Cotton, Linen, Wool (1845)<br>
    Textile Fabrics (1870) · Textiles History (1914)<br>
    <span class="sm">5 rhetorical categories × 8 weave structures — each generation unique</span>
  </div>
</div>

<script>
// ── WORD BANKS (filler removed) ──
const BANKS = {
  divine: {
    label:"DIVINE ORIGINATORS", desc:"Women deified for textile invention",
    color:"#c9943a", bg:"#2a1e0c",
    words:["Si-ling-chi","silk","goddess","deified","Minerva","distaff","Isis","Arachne","Semiramis","inventress","Mamaoella","sovereign","Pamphile","woven","Parcae","culture","reeling","garments","discovered","spinning","weaving","honored","sacred","cocoon","filament","thread","creator","origin","loom","craft"]
  },
  artisan: {
    label:"SKILLED ARTISANS", desc:"Individual women credited with invention",
    color:"#4a9ab0", bg:"#0c1e2a",
    words:["wise-hearted","spin","hands","blue","purple","scarlet","linen","virtuous","industry","celebrated","skill","embroidery","golden","Sidonian","Helen","Spartan","superior","ornamental","textures","countrywomen","busied","maidens","spun","dyed","wove","stitched","crafted","designed","threaded","knotted"]
  },
  labor: {
    label:"ANONYMOUS LABOR", desc:"Women unnamed — described as collective mass",
    color:"#b06a50", bg:"#2a120c",
    words:["women","spun","fleeces","distaff","ancient","daily","ancestors","ranks","daughter","downwards","looms","worked","palace","graves","buried","epochs","spinning","employment","transferred","machine","grandmothers","swift","movements","tender","unnamed","collective","hands","feet","silent","erased"]
  },
  transgressive: {
    label:"TRANSGRESSIVE BODIES", desc:"Women condemned through textile rhetoric",
    color:"#9a5ab0", bg:"#1e0c2a",
    words:["silken","protection","body","shame","luxury","clothe","stigmatized","unseemly","womanish","condemned","transparent","shifts","begged","allow","mantle","reckoned","weight","gold","cravings","bodies","moralists","dress","veiled","exposed","forbidden","judged","blamed","denied","punished","silenced"]
  },
  regen: {
    label:"REGENERATED WORDS", desc:"New language forged — words never existed until now",
    color:"#5aaa4a", bg:"#0c2a0c",
    words:["silkgoddess","threadmother","loomborn","warpkeeper","fiberwise","reelqueen","shuttlehand","spindledancer","weavesong","clothbloom","distaffbearer","heddle-heart","selvage-soul","weftwhisper","yarnmind","spinfire","warpwisdom","threadstrength","loomlight","weavebrave","fabricfaith","bodyweave","veilbreaker","shameunwound","clothsovereign","loom-luminous","spindledawn","shuttleseed","warpworld","threadfuture"]
  }
};
const WEAVE_NAMES=["Plain","Twill","Satin","Basket","Herringbone","Diamond","Houndstooth","Birdseye"];
const weaves={
  Plain:(r,c)=>(r+c)%2===0,
  Twill:(r,c)=>((r+c)%4)<2,
  Satin:(r,c)=>((r*3+c)%5)===0,
  Basket:(r,c)=>(Math.floor(r/2)+Math.floor(c/2))%2===0,
  Herringbone:(r,c)=>{const y=r%8,s=y<4?y:7-y;return((c+s)%4)<2},
  Diamond:(r,c)=>{const rx=r%6,cx=c%6;return Math.abs(rx-3)+Math.abs(cx-3)<=3},
  Houndstooth:(r,c)=>{const p=(r%4<2)?0:1;return((c+p)%4)<2},
  Birdseye:(r,c)=>((r%4===0&&c%4===0)||(r%4===2&&c%4===2))
};
const CAT_ORDER=["divine","artisan","labor","transgressive","regen"];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function genPhrase(bank){return shuffle(bank.words).slice(0,6+Math.floor(Math.random()*6));}
function genPoem(words,key){
  const w=shuffle([...words]);while(w.length<12)w.push(w[Math.floor(Math.random()*w.length)]);
  const T={
    divine:[w[0]+" held "+w[1]+" before light,",w[2]+" of "+w[3]+", "+w[4]+" bright,","she "+w[5]+" what hands could never find —","the "+w[6]+" "+w[7]+", "+w[8]+" entwined,","a "+w[9]+" spun from "+w[10]+" "+w[11]+"."],
    artisan:["with "+w[0]+" she "+w[1]+" the "+w[2]+",",w[3]+" fingers, "+w[4]+" "+w[5]+" —","each "+w[6]+" a proof, each "+w[7]+" a name,",w[8]+" "+w[9]+", refusing "+w[10]+",","her "+w[11]+" outlasts the claim."],
    labor:["they called her "+w[0]+", called her "+w[1]+",",w[2]+" "+w[3]+" at the "+w[4]+" —","no name survives the "+w[5]+" "+w[6]+",","only "+w[7]+", only "+w[8]+",",w[9]+" "+w[10]+" through "+w[11]+"."],
    transgressive:["they said her "+w[0]+" was "+w[1]+",","her "+w[2]+" too "+w[3]+", her "+w[4]+" "+w[5]+" —","but "+w[6]+" knows the "+w[7]+" truth:","she wore the "+w[8]+" "+w[9]+",",w[10]+" "+w[11]+" — unashamed."],
    regen:[w[0]+" rises, "+w[1]+" breaks,",w[2]+" "+w[3]+" — the future wakes,","where "+w[4]+" meets "+w[5]+" spun,",w[6]+" "+w[7]+" has begun,",w[8]+" "+w[9]+" "+w[10]+" — undone, redone."]
  };
  return T[key]||T.divine;
}

// ── STATE ──
const COLS=44,ROWS=24,CELL=11;
let catIdx=0,weaveIdx=0,genCount=1;
let phrase=[],grid=[],filled=0;
let typedText="",poem=[],poemRevealed=0;
let phase="weaving"; // weaving | poetry | pause
let allPoems=[];
let typeTimer,fillTimer,poemTimer,pauseTimer;

function curBank(){return BANKS[CAT_ORDER[catIdx%CAT_ORDER.length]];}
function curWeave(){return WEAVE_NAMES[weaveIdx%WEAVE_NAMES.length];}
function curKey(){return CAT_ORDER[catIdx%CAT_ORDER.length];}

// ── RENDER ──
function renderStatus(){
  const b=curBank();
  document.getElementById("status").innerHTML=
    `<div class="badge" style="background:${b.bg};border:1px solid ${b.color}50;color:${b.color}">${b.label}</div>`+
    `<div class="badge" style="background:#111;color:#888">${curWeave()} Weave</div>`+
    `<div style="font-size:12px;color:#555">Gen #${genCount}</div>`;
  document.getElementById("desc").textContent=b.desc;
  document.getElementById("desc").style.color="#fff";
}

function renderTyping(){
  const b=curBank();
  const full=phrase.join("  ·  ");
  let html=`<span style="color:${b.color};opacity:.5">▍ </span><span>${typedText}</span>`;
  if(phase==="weaving") html+=`<span class="cursor" style="background:${b.color}"></span>`;
  document.getElementById("typing").innerHTML=html;
}

function renderGrid(){
  const el=document.getElementById("grid");
  const b=curBank();
  const wFn=weaves[curWeave()];
  const chars=phrase.join("").split("");
  const totalC=chars.length||1;
  el.style.gridTemplateColumns=`repeat(${COLS},${CELL}px)`;
  el.style.gridTemplateRows=`repeat(${ROWS},${CELL}px)`;
  el.style.width=COLS*CELL+"px";

  let html="";
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const idx=r*COLS+c;
      if(idx>=filled){
        html+=`<div class="cell" style="width:${CELL}px;height:${CELL}px"></div>`;
        continue;
      }
      const ch=chars[idx%totalC];
      // gap detection
      let cum=0,isGap=false;
      for(const w of phrase){cum+=w.length;if(idx%totalC===cum%totalC){isGap=true;break;}}
      if(isGap){html+=`<div class="cell" style="width:${CELL}px;height:${CELL}px"></div>`;continue;}

      const isWarp=wFn(r,c);
      const bg=isWarp?b.color:b.bg;
      const fw=isWarp?700:400;
      const op=isWarp?1:.65;
      html+=`<div class="cell" style="width:${CELL}px;height:${CELL}px;background:${bg};font-weight:${fw};opacity:${op}">${ch}</div>`;
    }
  }
  el.innerHTML=html;
}

function renderProgress(){
  const b=curBank();
  const pct=Math.min(100,Math.round(filled/(ROWS*COLS)*100));
  const el=document.getElementById("prog");
  el.style.width=pct+"%";
  el.style.background=b.color;
}

function renderPoem(){
  if(poem.length===0){document.getElementById("poem-area").innerHTML="";return;}
  const b=curBank();
  let html=`<div class="poem-box" style="background:${b.bg}cc;border:1px solid ${b.color}30">`;
  html+=`<div class="poem-label" style="color:${b.color}">Generation #${genCount} — ${curWeave()} Weave Poetry</div>`;
  for(let i=0;i<poem.length;i++){
    const vis=i<poemRevealed?"show":"";
    html+=`<div class="poem-line ${vis}" style="transition-delay:${i*0.08}s">${poem[i]}</div>`;
  }
  html+=`</div>`;
  document.getElementById("poem-area").innerHTML=html;
}

function renderArchive(){
  if(allPoems.length===0)return;
  const el=document.getElementById("archive");
  let html=`<div class="archive-label">Poem Archive</div>`;
  for(const p of allPoems){
    html+=`<div class="archive-entry" style="border:1px solid ${p.color}20">`;
    html+=`<div class="meta" style="color:${p.color}">Gen #${p.gen} · ${p.catLabel} · ${p.weave}</div>`;
    for(const l of p.lines) html+=`<div class="line">${l}</div>`;
    html+=`</div>`;
  }
  el.innerHTML=html;
  el.scrollTop=el.scrollHeight;
}

// ── ANIMATION LOOPS ──
function tickType(){
  const full=phrase.join("  ·  ");
  if(typedText.length<full.length){
    typedText=full.slice(0,typedText.length+1);
    renderTyping();
    typeTimer=setTimeout(tickType,25+Math.random()*35);
  }
}

function tickFill(){
  if(phase!=="weaving")return;
  const total=ROWS*COLS;
  if(filled>=total){
    // done weaving → poetry
    poem=genPoem(phrase,curKey());
    poemRevealed=0;
    phase="poetry";
    renderPoem();
    tickPoem();
    return;
  }
  filled+=1;
  renderGrid();
  renderProgress();
  fillTimer=setTimeout(tickFill,1);
}

function tickPoem(){
  if(poemRevealed<poem.length){
    poemRevealed++;
    renderPoem();
    poemTimer=setTimeout(tickPoem,550);
  } else {
    // archive it
    allPoems.push({lines:[...poem],catLabel:curBank().label,weave:curWeave(),gen:genCount,color:curBank().color});
    renderArchive();
    phase="pause";
    pauseTimer=setTimeout(startNewCycle,1200);
  }
}

function startNewCycle(){
  clearTimeout(typeTimer);clearTimeout(fillTimer);clearTimeout(poemTimer);clearTimeout(pauseTimer);
  catIdx=(catIdx+1)%CAT_ORDER.length;
  if(catIdx===0) weaveIdx++;
  genCount++;
  phrase=genPhrase(curBank());
  grid=[];filled=0;typedText="";poem=[];poemRevealed=0;
  phase="weaving";
  renderStatus();
  renderTyping();
  renderGrid();
  renderProgress();
  document.getElementById("poem-area").innerHTML="";
  tickType();
  tickFill();
}

// ── INIT ──
phrase=genPhrase(curBank());
renderStatus();
renderTyping();
renderGrid();
renderProgress();
tickType();
tickFill();
</script>
</body>
</html>
